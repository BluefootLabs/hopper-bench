# -- Overlay vs Pod parity proof ---------------------------------------

# The overlay (disc=5) and pod_from_bytes (disc=11) benchmarks already
# demonstrate the parity: overlay ~8 CU vs pod_from_bytes ~6 CU.
# The raw_cast_baseline (disc=16) at ~4 CU proves safe path is within
# 4 CU of raw. The narrative:
#
#   Raw cast (unsafe):  ~4 CU
#   pod_from_bytes:     ~6 CU  (+2 CU for bounds check)
#   overlay (safe):     ~8 CU  (+4 CU for header + layout_id + size)
#   check_account_full: ~120 CU (owner + disc + version + layout_id + size)
#
# Hopper's safe path costs 4 CU more than raw. That's the story.
