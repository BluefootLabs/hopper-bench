# Hopper CU Golden Baselines
#
# Each entry defines the maximum expected compute units for a single
# invocation of a Hopper primitive. CI fails if any measurement exceeds
# its budget by more than the configured tolerance (default: 5%).
#
# To update after an intentional CU change:
#   1. Run `./measure.sh --update`
#   2. Review the diff and commit.

[meta]
framework_version = "0.1.0"
measured_on = "2026-04-01"
tolerance_percent = 5

