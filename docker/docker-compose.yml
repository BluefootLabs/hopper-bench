# Hopper Benchmark: Docker Compose
#
# Spins up a throwaway Solana test validator that the host-side
# `hopper profile bench` runner targets over port 8899.
#
# Usage (via wrapper scripts):
#   Windows: bench\run-bench-docker.ps1
#   Linux:   bench/run-bench-docker.sh
#
# Manual lifecycle:
#   docker compose -f bench/docker/docker-compose.yml up -d
#   docker compose -f bench/docker/docker-compose.yml down
#
# To change the Solana version, override the image tag below or
# set SOLANA_IMAGE in your environment:
#   SOLANA_IMAGE=anzaxyz/agave:v2.3.13 docker compose ... up -d

name: hopper-bench

services:
  validator:
    image: ${SOLANA_IMAGE:-anzaxyz/agave:v2.3.13}
    command: >
      solana-test-validator
        --reset
        --quiet
        --ledger /ledger
        --rpc-port 8899
    ports:
      - "8899:8899"
      - "8900:8900"
    volumes:
      - ledger:/ledger
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8899/health | grep -q ok"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 15s

volumes:
  ledger:
